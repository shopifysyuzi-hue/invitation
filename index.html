<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reel Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#000;
}

/* =========================
   REEL HERO (VIDEO FEEL)
========================= */

.hero{
    height:100vh;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
    color:white;
}

/* KIDS IMAGES AS MOVING LAYERS */

.hero::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        url("https://cdn.shopify.com/s/files/1/0732/2163/6185/files/new_tyom_2.jpg?v=1781461221");

    background-size:cover;
    background-position:center;

    animation:zoomSlow 20s infinite alternate ease-in-out;
    filter:brightness(0.6);
    z-index:0;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;

    background:
        url("https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_2040.jpg?v=1781461384"),
        url("https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_9529_1_1.jpg?v=1781461485");

    background-size:cover;
    background-position:center;

    opacity:0.25;
    filter:blur(1px);
    animation:floatMove 15s infinite alternate ease-in-out;
    z-index:1;
}

/* soft cinematic overlay */
.overlay{
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.85));
    z-index:2;
}

/* =========================
   TEXT (REEL STYLE)
========================= */

.content{
    position:relative;
    z-index:3;
    animation:fadeUp 2s ease forwards;
}

h1{
    font-size:clamp(2rem,5vw,4rem);
    letter-spacing:2px;
    font-weight:600;
}

p{
    margin-top:10px;
    color:rgba(255,255,255,0.8);
}

/* CTA */
.btn{
    margin-top:30px;
    display:inline-block;
    padding:15px 40px;
    border-radius:50px;
    background:linear-gradient(135deg,#b08a6a,#e2c4a8);
    color:#000;
    font-weight:600;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* =========================
   ANIMATIONS (REEL FEEL)
========================= */

/* slow zoom like video camera */
@keyframes zoomSlow{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

/* floating movement */
@keyframes floatMove{
    from{transform:translateX(-10px) scale(1.05);}
    to{transform:translateX(10px) scale(1.1);}
}

/* text fade up */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px); filter:blur(5px);}
    to{opacity:1; transform:translateY(0); filter:blur(0);}
}

/* =========================
   SCROLL INDICATOR
========================= */

.scroll{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:3;
    color:white;
    opacity:0.7;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,10px);}
}

</style>
</head>

<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <h1>ՌՈԶԻ • ՏԵՈՆԱ • ԱՐՏՅՈՄ</h1>

        <p>Սուրբ Մկրտության Հրավեր</p>

        <a class="btn" href="#details">Դիտել Մանրամասները</a>

    </div>

    <div class="scroll">⬇</div>

</section>

</body>
</html>
