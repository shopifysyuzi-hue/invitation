<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Մկրտության Հրավեր</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
    font-family:'Poppins',sans-serif;
    color:#2b2320;
    background:#f7f1ea;
}

/* =========================
   SINGLE KID BACKGROUND ONLY
========================= */

body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-2;

    background:url("https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_2040.jpg?v=1781461384");
    background-size:cover;
    background-position:center;

    filter:blur(4px) brightness(1.25);
    transform:scale(1.05);
}

/* soft luxury overlay */
body::after{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;

    background:radial-gradient(circle at center,
        rgba(255,255,255,0.65),
        rgba(247,241,234,0.95));
}

/* =========================
   SECTIONS
========================= */

section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:70px 20px;
}

/* =========================
   HERO
========================= */

.hero h1{
    font-size:clamp(2rem,5vw,3.5rem);
    font-weight:600;
}

.hero p{
    margin-top:20px;
    color:#5a4a42;
    max-width:700px;
    line-height:1.7;
}

/* BUTTON */
.btn{
    margin-top:35px;
    display:inline-block;
    padding:15px 40px;
    border-radius:50px;
    background:#b08a6a;
    color:white;
    font-weight:600;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* =========================
   DATE + COUNTDOWN
========================= */

.date{
    font-size:5rem;
    font-weight:800;
    color:#b08a6a;
}

.subtitle{
    margin-top:10px;
    color:#6b5b52;
}

.countdown{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:25px;
    flex-wrap:wrap;
}

.box{
    min-width:75px;
    padding:12px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.box span{
    font-size:1.8rem;
    font-weight:700;
    display:block;
}

/* =========================
   CARDS
========================= */

.card{
    width:360px;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* =========================
   RSVP
========================= */

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
    justify-content:center;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
}

.yes{background:#b08a6a;color:white;}
.no{background:#e6ddd4;color:#3b2f2a;}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <div>

        <h1>Դուք հրավիրված եք</h1>

        <p>
            Ռոզի • Տեոնա • Արտյոմի Սուրբ Մկրտություն<br><br>
            Մեր կյանքի ամենակարևոր օրը կիսելու համար սիրով հրավիրում ենք ձեզ
        </p>

        <a class="btn" href="#info">Դիտել մանրամասները ↓</a>

    </div>

</section>

<!-- DATE + COUNTDOWN -->
<section id="info">

    <div>

        <div class="date">17 ՀՈՒԼԻՍ</div>
        <div class="subtitle">2026</div>

        <div class="countdown">

            <div class="box"><span id="d"></span><small>Օր</small></div>
            <div class="box"><span id="h"></span><small>Ժամ</small></div>
            <div class="box"><span id="m"></span><small>Րոպե</small></div>
            <div class="box"><span id="s"></span><small>Վայրկյան</small></div>

        </div>

    </div>

</section>

<!-- CHURCH -->
<section>

    <div class="card">

        <h3>⛪ Եկեղեցի</h3>
        <p>Սուրբ Հովհաննես Մկրտիչ եկեղեցի</p>
        <p><b>15:00</b></p>

    </div>

</section>

<!-- HALL -->
<section>

    <div class="card">

        <h3>🎉 Հանդիսություն</h3>
        <p>Palladium Hall</p>
        <p><b>17:00</b></p>

    </div>

</section>

<!-- RSVP -->
<section>

    <div class="card">

        <h3>Մասնակցություն</h3>

        <input id="name" placeholder="Ձեր անունը">

        <div class="buttons">

            <button class="yes" onclick="reply('Կգամ')">Կգամ</button>
            <button class="no" onclick="reply('Չեմ կարող')">Չեմ կարող</button>

        </div>

        <p id="result" style="margin-top:15px;color:#6b5b52;"></p>

    </div>

</section>

<script>

/* COUNTDOWN */
const target = new Date("July 17, 2026 15:00:00").getTime();

function update(){

    let now = new Date().getTime();
    let diff = target - now;

    document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);

}

setInterval(update,1000);
update();

/* RSVP */
function reply(answer){

    let name = document.getElementById("name").value;

    if(name === ""){
        alert("Խնդրում ենք գրել անունը");
        return;
    }

    document.getElementById("result").innerText =
        name + " → " + answer;

}

</script>

</body>
</html>
