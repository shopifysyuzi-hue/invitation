<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Մկրտության Հրավեր</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
    font-family:'Poppins',sans-serif;
    color:#2b2320;
    background:#f7f1ea;
}

/* =========================
   BACKGROUND (STABLE)
========================= */

.bg{
    position:fixed;
    inset:0;
    z-index:-2;
}

.bg img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(4px) brightness(1.2);
    transform:scale(1.05);
}

/* soft overlay */
.overlay{
    position:fixed;
    inset:0;
    z-index:-1;
    background:rgba(255,255,255,0.65);
}

/* =========================
   SECTIONS
========================= */

section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 20px;
}

/* =========================
   HERO
========================= */

h1{
    font-size:clamp(2rem,5vw,3.5rem);
    font-weight:600;
}

p{
    margin-top:15px;
    color:#5a4a42;
    max-width:650px;
    line-height:1.6;
}

/* BUTTON */
a.btn{
    display:inline-block;
    margin-top:25px;
    padding:15px 40px;
    border-radius:50px;
    background:#b08a6a;
    color:white;
    font-weight:600;
    text-decoration:none;
    transition:0.3s;
}

a.btn:hover{
    transform:scale(1.05);
}

/* =========================
   CARD
========================= */

.card{
    width:360px;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* =========================
   COUNTDOWN
========================= */

.countdown{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:20px;
    flex-wrap:wrap;
}

.box{
    min-width:70px;
    padding:10px;
    border-radius:12px;
    background:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.box span{
    font-size:1.6rem;
    font-weight:700;
    display:block;
}

.box small{
    color:#6b5b52;
}

/* =========================
   INPUT + BUTTONS
========================= */

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
}

.yes{background:#b08a6a;color:white;}
.no{background:#e6ddd4;color:#3b2f2a;}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
    <img src="https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_2040.jpg?v=1781461384">
</div>

<div class="overlay"></div>

<!-- HERO -->
<section>
    <div>

        <h1>Դուք հրավիրված եք</h1>

        <p>
            Ռոզի • Տեոնա • Արտյոմի Սուրբ Մկրտություն<br><br>
            Մեր կյանքի ամենակարևոր օրը կիսելու համար սիրով հրավիրում ենք ձեզ
        </p>

        <a class="btn" href="#info">Դիտել մանրամասները ↓</a>

    </div>
</section>

<!-- INFO -->
<section id="info">

    <div class="card">

        <h2>17 ՀՈՒԼԻՍ 2026</h2>

        <!-- COUNTDOWN -->
        <div class="countdown">

            <div class="box"><span id="d"></span><small>Օր</small></div>
            <div class="box"><span id="h"></span><small>Ժամ</small></div>
            <div class="box"><span id="m"></span><small>Րոպե</small></div>
            <div class="box"><span id="s"></span><small>Վայրկյան</small></div>

        </div>

        <hr style="margin:20px 0;opacity:0.2;">

        <p>⛪ Սուրբ Հովհաննես Մկրտիչ — 15:00</p>
        <p>🎉 Palladium Hall — 17:00</p>

        <input id="name" placeholder="Ձեր անունը">

        <div class="buttons">

            <button class="yes" onclick="reply('Կգամ')">Կգամ</button>
            <button class="no" onclick="reply('Չեմ կարող')">Չեմ կարող</button>

        </div>

        <p id="result" style="margin-top:15px;color:#6b5b52;"></p>

    </div>

</section>

<script>

/* COUNTDOWN */
const target = new Date("July 17, 2026 15:00:00").getTime();

function update(){

    let now = new Date().getTime();
    let diff = target - now;

    document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);

}

setInterval(update,1000);
update();

/* RSVP */
function reply(ans){

    let name = document.getElementById("name").value;

    if(name === ""){
        alert("Գրեք անունը");
        return;
    }

    document.getElementById("result").innerText =
        name + " → " + ans;

}

</script>

</body>
</html>
