<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Մկրտության Օր</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{margin:0;padding:0;box-sizing:border-box;}

html{
    scroll-behavior:smooth; /* IMPORTANT FIX */
}

body{
    font-family:'Poppins',sans-serif;
    background:#f6efe7;
    color:#3b2f2a;
}

/* =========================
   HERO
========================= */

.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    overflow:hidden;
    background:linear-gradient(135deg,#f7efe6,#e9ddcf);
}

/* floating soft background */
.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.7), transparent 50%);
    filter:blur(20px);
}

/* CONTENT */
.content{
    position:relative;
    z-index:2;
}

/* TITLE */
h1{
    font-size:clamp(2.5rem,6vw,4rem);
    font-weight:600;
}

/* SUB */
p{
    margin-top:10px;
    color:#6a5a52;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:25px;
    padding:15px 40px;
    border-radius:50px;
    background:linear-gradient(135deg,#b08a6a,#d6b89a);
    color:white;
    font-weight:600;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* =========================
   DETAILS SECTION
========================= */

.section{
    padding:100px 20px;
    text-align:center;
    background:#fff;
}

.card{
    margin:auto;
    margin-top:30px;
    max-width:700px;
    padding:30px;
    border-radius:20px;
    background:#f7efe6;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <div class="content">

        <h1>ՌՈԶԻ • ՏԵՈՆԱ • ԱՐՏՅՈՄ</h1>

        <p>Մկրտության Օր • 17 Հուլիսի 2026</p>

        <!-- FIXED BUTTON -->
        <a class="btn" href="#details">
            Բացել Մանրամասները ↓
        </a>

    </div>

</section>

<!-- DETAILS (IMPORTANT ID FIX) -->
<section class="section" id="details">

    <h2>Միջոցառման Մանրամասներ</h2>

    <div class="card">

        ⛪ Եկեղեցի՝ 15:00<br><br>
        🎉 Ռեստորան՝ 17:00<br><br>
        📅 17 Հուլիսի 2026<br><br>

        Սիրով սպասում ենք Ձեզ ❤️

    </div>

</section>

</body>
</html>
