<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Մկրտության Օր</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:#222;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
    color:white;
    position:relative;
    overflow:hidden;
    padding:20px;
}

/* IMAGE COLLAGE */
.hero-images{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.hero-images img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.5);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    transition:0.3s;
}

.hero-images img:hover{
    transform:scale(1.1);
}

/* TEXT */
.hero h1{
    font-size:clamp(2.5rem,6vw,4.5rem);
    font-weight:700;
    text-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.hero p{
    margin-top:10px;
    font-size:1.2rem;
    opacity:0.9;
}

/* SCROLL */
.scroll-down{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    color:white;
    animation:bounce 1.5s infinite;
    text-decoration:none;
}

.scroll-down div{
    font-size:28px;
}

@keyframes bounce{
    0%,100%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,10px);}
}

/* SECTION */
.section{
    padding:100px 20px;
    text-align:center;
}

.title{
    font-size:2.2rem;
    color:#0d47a1;
    margin-bottom:20px;
}

.info{
    max-width:800px;
    margin:auto;
    color:#555;
    font-size:1.1rem;
    line-height:1.8;
}

.card{
    margin-top:40px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <div>

        <!-- KIDS IMAGES -->
        <div class="hero-images">

            <img src="https://cdn.shopify.com/s/files/1/0732/2163/6185/files/new_tyom_2.jpg?v=1781461221">
            <img src="https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_2040.jpg?v=1781461384">
            <img src="https://cdn.shopify.com/s/files/1/0732/2163/6185/files/IMG_9529_1_1.jpg?v=1781461485">

        </div>

        <h1>ՌՈԶԻ • ՏԵՈՆԱ • ԱՐՏՅՈՄ</h1>

        <p>Մկրտության Օր • 17 Հուլիսի 2026</p>

    </div>

    <!-- SCROLL -->
    <a href="#details" class="scroll-down">
        <div>↓</div>
    </a>

</section>

<!-- DETAILS -->
<section class="section" id="details">

    <div class="title">Միջոցառման Մանրամասներ</div>

    <div class="info">

        Սիրով հրավիրում ենք Ձեզ մասնակցելու մեր փոքրիկների մկրտությանը։

        <div class="card">

            ⛪ Սուրբ Հովհաննես Մկրտիչ եկեղեցի (Աբովյան)<br><br>
            🕔 Ժամը՝ 17:00<br><br>
            🎉 Palladium Hall<br><br>
            📅 17 Հուլիսի 2026

        </div>

        <p style="margin-top:30px;">
            Ձեր ներկայությունը մեզ համար մեծ ուրախություն կլինի ❤️
        </p>

    </div>

</section>

</body>
</html>
