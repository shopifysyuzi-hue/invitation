<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Մկրտության Հրավեր</title>

<!-- Armenian-friendly font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: "Noto Sans Armenian", sans-serif;
        background: linear-gradient(180deg, #f7f5ff, #ffffff);
        color: #333;
    }

    header {
        text-align: center;
        padding: 50px 20px;
        background: #6c5ce7;
        color: white;
    }

    header h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    header p {
        font-size: 18px;
        opacity: 0.9;
    }

    .hero-images {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 30px;
    }

    .hero-images img {
        width: 320px;
        height: 220px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .info {
        text-align: center;
        padding: 30px;
    }

    .info h2 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    .buttons {
        margin-top: 20px;
    }

    button {
        padding: 12px 18px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
    }

    .map-btn { background: #00b894; color: white; }
    .call-btn { background: #0984e3; color: white; }
    .rsvp-btn { background: #6c5ce7; color: white; }

    section {
        padding: 40px 20px;
    }

    .rsvp {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .rsvp input, .rsvp textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
    }

    .rsvp button {
        width: 100%;
        background: #6c5ce7;
        color: white;
    }

    footer {
        text-align: center;
        padding: 20px;
        font-size: 14px;
        color: #777;
    }

    @media(max-width: 768px){
        header h1 { font-size: 28px; }
        .hero-images img { width: 90%; }
    }
</style>
</head>

<body>

<header>
    <h1>Տեոնայի Մկրտություն</h1>
    <p>Մենք սիրով հրավիրում ենք ձեզ մասնակցելու այս գեղեցիկ օրվան 💜</p>
</header>

<!-- IMAGES SECTION -->
<div class="hero-images">

    <!-- Replace these with your generated 3D illustrations -->
    <img src="church-illustration.png" alt="Եկեղեցի">
    <img src="restaurant-illustration.png" alt="Ռեստորան">

</div>

<!-- INFO -->
<section class="info">
    <h2>Օրվա մանրամասները</h2>
    <p>📍 Եկեղեցի + Հյուրասիրություն ռեստորանում</p>
    <p>🗓️ Ամսաթիվ: 13.08</p>
    <p>⏰ Ժամ՝ 14:00</p>

    <div class="buttons">
        <button class="map-btn" onclick="window.open('https://maps.google.com')">Դիտել քարտեզը</button>
        <button class="call-btn" onclick="window.location.href='tel:+37400000000'">Զանգահարել</button>
        <button class="rsvp-btn" onclick="document.getElementById('rsvp').scrollIntoView({behavior:'smooth'})">RSVP</button>
    </div>
</section>

<!-- RSVP -->
<section id="rsvp">
    <div class="rsvp">
        <h2 style="text-align:center;">Հաստատել մասնակցությունը</h2>

        <input type="text" placeholder="Ձեր անունը">
        <input type="number" placeholder="Հյուրերի քանակը">
        <textarea rows="4" placeholder="Ձեր հաղորդագրությունը"></textarea>

        <button onclick="alert('Շնորհակալություն ձեր պատասխանելու համար ❤️')">
            Ուղարկել
        </button>
    </div>
</section>

<footer>
    Սիրով սպասում ենք ձեզ մեր հատուկ օրը 💜
</footer>

</body>
</html>
